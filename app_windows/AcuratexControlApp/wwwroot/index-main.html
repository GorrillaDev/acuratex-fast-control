<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acuratex Control App</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/main-control-panel.css" rel="stylesheet" />
  <link href="css/acuratex-window-chrome.css" rel="stylesheet" />
  <link href="css/app-alert-modal.css" rel="stylesheet" />
</head>
<body>
  <div id="app">CARGANDO</div>

  <div id="blazor-error-ui">
    Ocurrio un error no controlado.
    <a href="" class="reload">Recargar</a>
    <a class="dismiss">x</a>
  </div>

  <script>
    window.acuratexMainPanel = {
      scrollLog: function (id) {
        const el = document.getElementById(id);
        if (el) {
          el.scrollTop = el.scrollHeight;
        }
      }
    };
  </script>
  <script src="_framework/blazor.webview.js"></script>
</body>
</html>
